<!--
  EnergyOS — Base layout reference.
  Copy structure into each template. Replace #CONTENT# block.

  Brand tokens:
    navy ink:    #163759
    navy deep:   #0d2136
    forest:      #15caca
    forest dark: #0e8a8a
    surface:     #F8FAFC
    border:      #E2E8F0
    muted:       #64748B

  Logo URL: {{ .SiteURL }}/logo.png
-->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <meta name="supported-color-schemes" content="light" />
    <title>EnergyOS</title>
  </head>
  <body style="margin:0;padding:0;background-color:#F8FAFC;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#163759;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F8FAFC;">
      <tr>
        <td align="center" style="padding:40px 16px;">
          <table role="presentation" width="520" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;width:100%;background:#FFFFFF;border-radius:16px;border:1px solid #E2E8F0;box-shadow:0 10px 34px rgba(15,23,42,0.06);overflow:hidden;">
            <!-- Header band -->
            <tr>
              <td style="background:linear-gradient(135deg,#163759 0%,#0d2136 100%);padding:28px 32px;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td align="left">
                      <img src="{{ .SiteURL }}/logo.png" alt="EnergyOS" height="32" style="display:block;height:32px;width:auto;border:0;outline:none;text-decoration:none;" />
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- #CONTENT# -->

            <!-- Footer -->
            <tr>
              <td style="background:#F8FAFC;border-top:1px solid #E2E8F0;padding:20px 32px;text-align:center;">
                <p style="margin:0 0 6px;color:#64748B;font-size:12px;line-height:1.5;">
                  © EnergyOS · Plataforma de gestión energética
                </p>
                <p style="margin:0;color:#94A3B8;font-size:11px;line-height:1.5;">
                  Si no solicitaste este correo, puedes ignorarlo.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
